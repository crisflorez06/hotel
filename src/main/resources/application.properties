spring.application.name=Hotel
spring.profiles.default=dev
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3311/hotel?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Bogota}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:hotel}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:hotel123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
server.port=8080
server.address=0.0.0.0

# Scalar configuration
scalar.url=/v3/api-docs

# JWT configuration
jwt.secret=${JWT_SECRET:oF1mC8fLw4nqZp9x2g4aV7qZQy8Z3rQ2uD6vH1mK5pQ=}
jwt.expiration-hours=${JWT_EXPIRATION_HOURS:4}

# Ejecutar scripts SQL de inicializacion (triggers)
spring.sql.init.mode=always
spring.sql.init.platform=mysql
spring.sql.init.separator=$$
spring.jpa.defer-datasource-initialization=true
