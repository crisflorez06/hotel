<div class="app-loader" [class.app-loader--visible]="isLoading" aria-live="polite">
  <div class="app-loader__panel" role="status" [attr.aria-busy]="isLoading">
    <span class="app-loader__spinner" aria-hidden="true"></span>
    <p>Cargando vista...</p>
  </div>
</div>

<div
  class="app-feedback-toast"
  *ngIf="feedbackToast.toast() as toast"
  [class.app-feedback-toast--error]="toast.type === 'error'"
  [class.app-feedback-toast--ok]="toast.type === 'success'"
>
  {{ toast.message }}
</div>

<header class="app-header" *ngIf="isAppShellVisible">
  <div class="app-header__brand">Hotel</div>
  <nav class="app-header__nav">
    <a routerLink="/dashboard" routerLinkActive="is-active">Dashboard</a>
    <a routerLink="/monitor-eventos" routerLinkActive="is-active">Eventos</a>
    <a routerLink="/recepcion" routerLinkActive="is-active">Recepcion</a>
    <a routerLink="/calendario" routerLinkActive="is-active">Calendario</a>
    <a routerLink="/reservas" routerLinkActive="is-active">Reservas</a>
    <a routerLink="/estancias" routerLinkActive="is-active">Estancias</a>
    <a routerLink="/pagos" routerLinkActive="is-active">Pagos</a>
    <a routerLink="/ocupantes/tabla-clientes" routerLinkActive="is-active">Clientes</a>
    <a routerLink="/ajustes" routerLinkActive="is-active">Ajustes</a>
  </nav>
  <div class="app-header__user" *ngIf="authState().isAuthenticated">
    <span class="app-header__user-name">{{ authState().token ? 'Usuario' : '' }}</span>
    <button class="app-header__logout" (click)="logout()">Cerrar sesión</button>
  </div>
</header>

<main class="app-main" [class.app-shell--loading]="isLoading">
  <router-outlet></router-outlet>
</main>
