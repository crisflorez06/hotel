<section class="estancia-salida">
  <div class="toast" *ngIf="mostrarToast">{{ toastMensaje }}</div>
  <header class="estancia-salida__header">
    <div>
      <h1>Dar salida</h1>
      <p>Finaliza la estancia activa.</p>
    </div>
    <button type="button" class="btn-secundario" (click)="volver()">Volver</button>
  </header>

  <form class="estancia-salida__form" (ngSubmit)="guardar()">
    <div class="campo">
      <label>Codigo</label>
      <input type="text" [value]="codigo" disabled />
    </div>

    <div class="campo">
      <label>Tipo de unidad</label>
      <input type="text" [value]="tipoUnidad" disabled />
    </div>

    <div class="campo">
      <label>Entrada real</label>
      <input type="text" [value]="entradaReal" disabled />
    </div>

    <div class="campo">
      <label>Salida estimada</label>
      <input type="text" [value]="salidaEstimada" disabled />
    </div>

    <div class="campo">
      <label>Salida real *</label>
      <input
        type="text"
        mwlFlatpickr
        [(ngModel)]="fechaSalidaReal"
        name="fechaSalidaReal"
        (ngModelChange)="recalcularPago()"
        [enableTime]="true"
        [time24hr]="true"
        [dateFormat]="'Y-m-d H:i'"
        placeholder="YYYY-MM-DD HH:mm"
        required
      />
    </div>

    <div class="campo campo--full">
      <label>Notas de salida</label>
      <textarea rows="3" [(ngModel)]="notasSalida" name="notasSalida"></textarea>
    </div>

    <div class="campo campo--full">
      <label>
        <input type="checkbox" [(ngModel)]="conPago" name="conPago" (ngModelChange)="recalcularPago()" />
        Registrar pago
      </label>
    </div>

    <div class="pago" *ngIf="conPago">
      <div class="campo">
        <label>Tipo pago</label>
        <input type="text" [value]="tipoPago" disabled />
      </div>
      <div class="campo">
        <label>Monto *</label>
        <input type="number" [(ngModel)]="monto" name="monto" />
      </div>
      <div class="calculo">
        <div>
          <h3>Calcular pago</h3>
          <p>
            Total de personas: <strong>{{ numeroPersonas }}</strong>
          </p>
          <p *ngIf="calculandoPago">Calculando...</p>
          <p class="calculo__resultado" *ngIf="totalCalculado !== null">
            Total calculado: <strong>{{ totalCalculado | number : '1.0-0' }}</strong>
          </p>
          <p class="estado estado--error" *ngIf="calculoError">{{ calculoError }}</p>
        </div>
      </div>
      <div class="campo">
        <label>Medio de pago</label>
        <select [(ngModel)]="medioPago" name="medioPago">
          <option *ngFor="let medio of mediosPago" [value]="medio">{{ medio }}</option>
        </select>
      </div>
      <div class="campo">
        <label>Fecha pago *</label>
        <input
          type="text"
          mwlFlatpickr
          [(ngModel)]="fechaPago"
          name="fechaPago"
          [enableTime]="true"
          [time24hr]="true"
          [dateFormat]="'Y-m-d H:i'"
          placeholder="YYYY-MM-DD HH:mm"
        />
      </div>
      <div class="campo">
        <label>Estado</label>
        <select [(ngModel)]="estadoPago" name="estadoPago">
          <option *ngFor="let estado of estadosPago" [value]="estado">{{ estado }}</option>
        </select>
      </div>
    </div>

    <p class="estado estado--error" *ngIf="error">{{ error }}</p>
    <p class="estado estado--ok" *ngIf="exito">{{ exito }}</p>

    <button type="submit" [disabled]="guardando || !estanciaId">Finalizar estancia</button>
  </form>
</section>
